# ./provisioning/dashboards/dashboard_provider.yml
apiVersion: 1

providers:
  - name: 'HEARTS360 Dashboards'
    orgId: 1
    folder: 'Dashboards'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/provisioning/dashboards/Dashboards
      foldersFromFilesStructure: false

  - name: 'Facility Dashboards With Security'
    orgId: 1
    folder: 'Facility dashboards (with security)'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    options:
      path: /etc/grafana/provisioning/dashboards_secure
      foldersFromFilesStructure: false
