name: Reusable EC2 Deploy

on:
  workflow_call:
    inputs:
      ec2_deploy_path:
        required: true
        type: string
    secrets:
      EC2_HOST:
        required: true
      EC2_USER:
        required: true
      EC2_SSH_PRIVATE_KEY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prepare deploy directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -eu
            mkdir -p "${{ inputs.ec2_deploy_path }}"

      - name: Fix permissions on deploy directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            sudo chown -R $USER "${{ inputs.ec2_deploy_path }}"

      - name: Stop running containers
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd "${{ inputs.ec2_deploy_path }}" && docker compose down || true
            # Force remove the specific conflicting grafana container
            docker rm -f grafana postgres filebrowser-quantum || true

      - name: Copy project files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "."
          target: "${{ inputs.ec2_deploy_path }}"
          overwrite: true

      - name: Deploy with Docker Compose on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            set -eu
            cd "${{ inputs.ec2_deploy_path }}"
            docker rm -f grafana postgres filebrowser-quantum file-upload-trigger || true
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f