name: Full Redeploy EC2 (Reusable)

on:
  workflow_call:
    inputs:
      ec2_deploy_path:
        required: true
        type: string
        default: '/home/ec2-user/h360tk_philippines'
      deploy_ref:
        required: false
        type: string
        default: 'refs/heads/main'
    secrets:
      EC2_HOST:
        required: true
      EC2_USER:
        required: true
      EC2_SSH_PRIVATE_KEY:
        required: true

jobs:
  full_redeploy:
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.deploy_ref }}

      - name: Stop existing containers on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd "${{ inputs.ec2_deploy_path }}" || true
            docker compose down --volumes --remove-orphans || true

      - name: Create deployment archive
        run: git archive --format=tar -o deploy.tar.gz HEAD

      - name: Delete all data and directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            sudo rm -rf "${{ inputs.ec2_deploy_path }}"

      - name: Prepare deploy directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            mkdir -p "${{ inputs.ec2_deploy_path }}"

      - name: Copy deployment archive to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "${{ inputs.ec2_deploy_path }}/"
          overwrite: true

      - name: Extract deployment archive on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd "${{ inputs.ec2_deploy_path }}"
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

      - name: Deploy with Docker Compose on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd "${{ inputs.ec2_deploy_path }}"
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
